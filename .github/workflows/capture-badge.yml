name: Capture FOURKAY reviews badge

on:
  schedule:
    # Every day at 04:30 UTC (adjust if you want)
    - cron: '30 4 * * *'
  workflow_dispatch: {}

permissions:
  contents: write   
  
jobs:
  capture:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run Puppeteer screenshot
        run: npm run screenshot

      - name: Commit and push updated badge (if changed)
        run: |
          if git status --porcelain | grep -q "elfsight-badge.png"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add elfsight-badge.png
            git commit -m "Update Elfsight badge screenshot"
            git push
          else
            echo "No changes in elfsight-badge.png"
          fi
